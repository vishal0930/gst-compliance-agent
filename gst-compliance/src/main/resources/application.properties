# ============================================
# GST COMPLIANCE AGENT - MAIN CONFIGURATION
# ============================================

# Application Name
spring.application.name=gst-compliance-agent

# ========== LOGGING ==========
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.gstcompliance=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ========== DATABASE (PostgreSQL) ==========
spring.datasource.url=jdbc:postgresql://localhost:5433/gst_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000

# ========== JPA / HIBERNATE ==========
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.show-sql=true

# ========== REDIS (Cache) ==========
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=6000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ========== FILE UPLOAD ==========
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== OLLAMA (Local LLM) ==========
# No API key needed! Ollama runs locally on port 11434
# Model: llama3.2:3b (installed locally)
# ========== OLLAMA EMBEDDING MODEL ==========
ollama.embedding.model=nomic-embed-text
ollama.embedding.url=http://localhost:11434/api/embeddings

# ========== AWS S3 / MINIO ==========
aws.s3.bucket=${S3_BUCKET:gst-invoices}
aws.s3.region=${S3_REGION:ap-south-1}
aws.s3.access-key=${AWS_ACCESS_KEY:minioadmin}
aws.s3.secret-key=${AWS_SECRET_KEY:minioadmin}
aws.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}

# ========== JWT (Authentication) ==========
jwt.secret=ywgsdhfweynfry7wty87ef87gw7hE87GMF98AE87GQWED87
jwt.expiration=86400000

# ========== MONITORING ==========
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ========== FLYWAY ==========
spring.flyway.create-database=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true

# ========== SPRING MAIN ==========
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# ========== EMAIL (Disabled for now) ==========
notification.email.enabled=false

pipeline.enable-hsn-classification=true
pipeline.enable-reconciliation=true
pipeline.enable-deadline-tracking=true
pipeline.enable-return-drafting=true