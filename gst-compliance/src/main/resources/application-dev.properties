# ============================================
# DEVELOPMENT ENVIRONMENT
# ============================================

# Database - Use different DB name for dev
spring.datasource.url=jdbc:postgresql://localhost:5432/gst_db_dev
spring.datasource.hikari.maximum-pool-size=5

# JPA - Drop & recreate tables, show SQL
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - More detailed
logging.level.com.gstcompliance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Disable email in dev
notification.email.enabled=false

# Disable rate limiting in dev
rate-limiter.enabled=false